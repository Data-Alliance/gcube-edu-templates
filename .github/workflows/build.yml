name: build gcube-edu-templates

on:
  workflow_dispatch:
    inputs:
      template:
        type: choice
        options:
          - all
          - edu-dl-tensorflow
          - edu-cv-pytorch
          - edu-ml-data
          - edu-nlp-hf
          - edu-rl-pytorch
          - edu-genai-sd
          - edu-llm-train
          - edu-audio-pytorch
          - edu-medical-monai
          - edu-geo-gdal
          - edu-gnn-pyg
        default: edu-cv-pytorch
      update_readme:
        type: boolean
        description: 'Update README package versions after build'
        default: true

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  DOCKERHUB_OWNER: ${{ secrets.DOCKERHUB_OWNER }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.set.outputs.templates }}
    steps:
      - id: set
        run: |
          if [ "${{ inputs.template }}" = "all" ]; then
            echo 'templates=["edu-dl-tensorflow","edu-cv-pytorch","edu-ml-data","edu-nlp-hf","edu-rl-pytorch","edu-genai-sd","edu-llm-train","edu-audio-pytorch","edu-medical-monai","edu-geo-gdal","edu-gnn-pyg"]' >> $GITHUB_OUTPUT
          else
            echo 'templates=["${{ inputs.template }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        template: ${{ fromJson(needs.prepare.outputs.templates) }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /
      - name: Set lowercase owner
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}
      - name: Set build date
        run: echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
      - name: Resolve base image
        id: base
        run: |
          case "${{ matrix.template }}" in
            edu-dl-tensorflow)
              echo "image=ghcr.io/${{ env.OWNER_LC }}/gcube-tensorflow-2.17-cuda12.8:runtime" >> $GITHUB_OUTPUT
              ;;
            edu-ml-data)
              echo "image=ghcr.io/${{ env.OWNER_LC }}/gcube-ubuntu24.04-cuda13.0:runtime" >> $GITHUB_OUTPUT
              ;;
            edu-cv-pytorch|edu-nlp-hf|edu-rl-pytorch|edu-genai-sd|edu-llm-train|edu-audio-pytorch|edu-medical-monai|edu-geo-gdal|edu-gnn-pyg)
              echo "image=ghcr.io/${{ env.OWNER_LC }}/gcube-pytorch-2.11-cuda13.0:runtime" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown template: ${{ matrix.template }}" && exit 1
              ;;
          esac
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.template }}
          file: ./${{ matrix.template }}/Dockerfile
          load: true
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.template }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.template }}:${{ env.BUILD_DATE }}
            ${{ env.DOCKERHUB_OWNER }}/${{ matrix.template }}:latest
            ${{ env.DOCKERHUB_OWNER }}/${{ matrix.template }}:${{ env.BUILD_DATE }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          push: true
      - name: Update README versions
        if: ${{ inputs.update_readme }}
        run: |
          python3 .github/scripts/update_readme_versions.py \
            "./${{ matrix.template }}/README.md" \
            "${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.template }}:${{ env.BUILD_DATE }}" \
            "$(date +%Y-%m-%d)"
      - name: Commit README
        if: ${{ inputs.update_readme }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- "./${{ matrix.template }}/README.md"; then
            echo "No README changes."
          else
            git add "./${{ matrix.template }}/README.md"
            git commit -m "docs: update ${{ matrix.template }} package versions (${{ env.BUILD_DATE }})"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi