name: build gcube-edu-templates

on:
  workflow_dispatch:
    inputs:
      template:
        type: choice
        options:
          - edu-dl-tensorflow
          - edu-cv-pytorch
          - edu-ml-data
          - edu-nlp-hf
          - edu-rl-pytorch
          - edu-genai-sd
          - edu-llm-train
        default: edu-cv-pytorch
      tag:
        type: string
        default: latest

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  DOCKERHUB_OWNER: chaeyoon08

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /
      - name: Resolve base image
        id: base
        run: |
          case "${{ inputs.template }}" in
            edu-dl-tensorflow)
              echo "image=ghcr.io/${{ env.OWNER }}/gcube-tensorflow-2.17-cuda12.8:runtime" >> $GITHUB_OUTPUT
              ;;
            edu-ml-data)
              echo "image=ghcr.io/${{ env.OWNER }}/gcube-ubuntu24.04-cuda13.0:runtime" >> $GITHUB_OUTPUT
              ;;
            edu-cv-pytorch|edu-nlp-hf|edu-rl-pytorch|edu-genai-sd|edu-llm-train)
              echo "image=ghcr.io/${{ env.OWNER }}/gcube-pytorch-2.11-cuda13.0:runtime" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown template: ${{ inputs.template }}" && exit 1
              ;;
          esac
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.template }}
          file: ./${{ inputs.template }}/Dockerfile
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ inputs.template }}:${{ inputs.tag }}
            ${{ env.DOCKERHUB_OWNER }}/${{ inputs.template }}:${{ inputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          push: true