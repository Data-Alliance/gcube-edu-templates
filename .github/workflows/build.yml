name: build gcube-edu-templates

on:
  workflow_dispatch:
    inputs:
      template:
        type: choice
        options:
          - edu-dl-tensorflow
          - edu-cv-pytorch
        default: edu-dl-tensorflow
      base_image:
        type: string
        default: ghcr.io/chaeyoon-08/gcube-tensorflow-2.17-cuda12.8:runtime
      tag:
        type: string
        default: latest

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  DOCKERHUB_OWNER: chaeyoon08

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ inputs.template }}
          file: ./${{ inputs.template }}/Dockerfile
          build-args: |
            BASE_IMAGE=${{ inputs.base_image }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ inputs.template }}:${{ inputs.tag }}
            ${{ env.DOCKERHUB_OWNER }}/${{ inputs.template }}:${{ inputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          push: true