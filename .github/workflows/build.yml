name: build gcube-edu-templates

on:
  workflow_dispatch:
    inputs:
      template:
        type: choice
        options:
          - all
          - edu-dl-tensorflow
          - edu-cv-pytorch
          - edu-ml-data
          - edu-nlp-hf
          - edu-rl-pytorch
          - edu-genai-sd
          - edu-llm-train
          - edu-audio-pytorch
          - edu-medical-monai
          - edu-geo-gdal
        default: edu-cv-pytorch
      tag:
        type: string
        default: latest

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  DOCKERHUB_OWNER: ${{ secrets.DOCKERHUB_OWNER }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.set.outputs.templates }}
    steps:
      - id: set
        run: |
          if [ "${{ inputs.template }}" = "all" ]; then
            echo 'templates=["edu-dl-tensorflow","edu-cv-pytorch","edu-ml-data","edu-nlp-hf","edu-rl-pytorch","edu-genai-sd","edu-llm-train","edu-audio-pytorch","edu-medical-monai","edu-geo-gdal"]' >> $GITHUB_OUTPUT
          else
            echo 'templates=["${{ inputs.template }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.prepare.outputs.templates) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /
      - name: Set lowercase owner
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}
      - name: Resolve base image
        id: base
        run: |
          case "${{ matrix.template }}" in
            edu-dl-tensorflow)
              echo "image=ghcr.io/${{ env.OWNER_LC }}/gcube-tensorflow-2.17-cuda12.8:runtime" >> $GITHUB_OUTPUT
              ;;
            edu-ml-data)
              echo "image=ghcr.io/${{ env.OWNER_LC }}/gcube-ubuntu24.04-cuda13.0:runtime" >> $GITHUB_OUTPUT
              ;;
            edu-cv-pytorch|edu-nlp-hf|edu-rl-pytorch|edu-genai-sd|edu-llm-train|edu-audio-pytorch|edu-medical-monai|edu-geo-gdal)
              echo "image=ghcr.io/${{ env.OWNER_LC }}/gcube-pytorch-2.11-cuda13.0:runtime" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown template: ${{ matrix.template }}" && exit 1
              ;;
          esac
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.template }}
          file: ./${{ matrix.template }}/Dockerfile
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.template }}:${{ inputs.tag }}
            ${{ env.DOCKERHUB_OWNER }}/${{ matrix.template }}:${{ inputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          push: true